services:
  - type: web
    name: sudoku-solver
    runtime: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn --workers 2 --timeout 120 --bind 0.0.0.0:$PORT src.ui.app:app"
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"